    通常スキップするステップ「バックアップパスの多様性確認」を含めて。

- tool_call_id: '["run_ncVHImkr43GefbeHh8U6Npso", "call_6r57d0BUKKOXLtetkdo8WZfu"]'
  title: 1時間あたり$75,000
  body: >
