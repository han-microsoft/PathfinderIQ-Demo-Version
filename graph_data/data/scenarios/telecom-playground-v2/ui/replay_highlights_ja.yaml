- tool_call_id: 'call_delegate_comms'
  title: 単一の情報源
  body: >
    SEV-1チケット、顧客アドバイザリー、関係者メールがすべて同じ根本原因、
    影響範囲、是正状況から生成されます。

- tool_call_id: '["run_blastradius", "call_blastradius"]'
  title: ビジネスインパクトの定量化
  body: >
    1回のツール呼び出しで被害を集計 — 影響を受けるユーザー18,400人、SLA違約金は時間あたり75,000ドル、
    リスクにさらされる顧客契約は420万ドル。モバイル5Gサービスは影響を受けないことを確認し、影響範囲を限定。
    CIOが求める数字を数秒で。
- tool_call_id: '["run_blastradius_orch", "call_blastradius_orch"]'
  title: 結論
  body: >
    オーケストレーターは定量化されたビジネスインパクトで締めくくります — 18,400人のユーザー、
    時間あたり75,000ドルのSLAリスク、420万ドルの契約リスク、モバイル5Gは対象外。
    アラートの嵐から数分で、コスト換算された経営層向けサマリーへ。
