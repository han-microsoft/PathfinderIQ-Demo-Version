- tool_call_id: 'call_sensor_graph'
  title: センサー発見
  body: >
    1つのクエリで障害ファイバー沿いのすべての光センサーをGPS座標付きで取得 —
    スプレッドシートは不要です。

- tool_call_id: 'call_sensor_readings'
  title: 障害位置の特定
  body: >
    45kmのセンサーは正常読み取り、195kmのセンサーは光損失 —
    900km回廊から150kmのセグメントに障害を絞り込みました。

- tool_call_id: 'call_conduit_check'
  title: 隠れたリスク
  body: >
    両方のファイバーが同じ地下ダクトを共有 — 「バックアップ」は
    物理的に多様化されていません。

- tool_call_id: '["run_ncVHImkr43GefbeHh8U6Npso", "call_SCa8VO20xVEkhAwoTE9twgOF"]'
  title: 正確な手順を即座に
  body: >
