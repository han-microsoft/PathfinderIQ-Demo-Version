- title: Scenario Overview
  body: >
    It's 2:31 PM. In one second, twenty alarms cascade across the
    Sydney-Melbourne corridor — two enterprise banks lose their VPNs and the
    SLA penalty clock starts ticking. A fibre cut has severed the primary path.
    Coordinating a response by hand takes a NOC hours. Watch a multi-agent team
    on the Microsoft IQ stack find the root cause, expose a hidden shared-risk
    in the "redundant" backup, quantify the exact dollar exposure, and execute
    the fix — in minutes.
  cta: Start Demo

- title: NOC Orchestrator
  body: >
    The orchestrator receives the raw alert burst and acts as the central
    coordinator. Built on Azure AI Foundry, it decomposes the incident into
    specialist tasks and delegates them in parallel, combining graph
    reasoning, document retrieval, and field logistics into a single agentic
    workflow.
  cta: Continue
  agent_image: ui/assets/agents/nocorchestrator_fullbody.png
  powered_by:
    logo: ui/assets/logos/foundryiq-logo.png
    label: Azure AI Foundry
    description: >
      Multi-agent orchestration, task decomposition, parallel delegation, and
      synthesis across specialist agents.

- title: Orchestrator - Planning
  body: >
    The orchestrator is now reading the correlated alerts, forming a diagnosis
    plan, and dispatching tasks to three specialist agents simultaneously.
    Each agent has its own tools and data sources, but they all share the same
    network graph as their common picture of the network.

    Watch for the highlights on key tool results, they explain why each
    finding matters.
  cta: Continue

- title: Network Investigator
  body: >
    This agent reads the live network graph in Microsoft Fabric to trace which
    services depend on the failed link, then cross-references real-time optical
    telemetry to confirm the loss of light. It reads the individual optical
    sensors along the corridor to pinpoint the exact fault segment, and checks
    whether the “backup” fibre actually shares the same physical conduit.
  cta: Continue
  agent_image: ui/assets/agents/networkinvestigator_fullbody.png
  powered_by:
    logo: ui/assets/logos/fabric-logo.png
    label: Fabric IQ
    description: >
      A live, connected network graph for topology and sensor lookup, plus
      real-time optical telemetry — the data layer behind the diagnosis.

- title: Knowledge Analyst
  body: >
    This agent searches operational runbooks and historical incident tickets
    using Azure AI Search with vector and semantic ranking. It finds the exact
    SOP for this fault type, surfaces past incidents on the same corridor
    including a critical shared-risk conduit warning, and quantifies the SLA
    penalty exposure: $75,000 per hour across the affected enterprise VPNs.
  cta: Continue
  agent_image: ui/assets/agents/knowledgeanalyst_fullbody.png
  powered_by:
    logo: ui/assets/logos/foundryiq-logo.png
    label: Foundry IQ
    description: >
      Azure AI Search for vector retrieval across runbooks, SOPs, historical
      tickets, and SLA policies.

- title: Field Coordinator
  body: >
    This agent traverses the graph to find amplifier sites, optical sensors
    with GPS coordinates, servicing depots, and on-duty engineers along the
    corridor. It then checks equipment manifests via search to confirm OTDR
    and splicer availability, producing a ranked dispatch plan ready for
    operator approval.
  cta: Continue
  agent_image: ui/assets/agents/fieldcoordinator_fullbody.png
  powered_by:
    logo: ui/assets/logos/fabric-logo.png
    label: Fabric IQ
    description: >
      Graph traversal for depot and roster lookup plus AI Search for equipment
      manifests, bridging digital topology to physical field operations.

- title: Orchestrator - Remediation
  body: >
    The orchestrator synthesises all specialist findings and executes
    immediate remediation: rerouting VPN traffic to the backup MPLS path and
    placing the failed link in admin-down. Before sending anyone to site, it
    pauses and presents the operator a clear, costed choice — one team or two
    — with a recommendation, then dispatches the nearest engineer to the
    Goulburn splice site and calls them to confirm ETA. Because the reroute
    landed in about ninety seconds, the enterprise SLA exposure was held to a
    fraction of the $75,000-per-hour it would otherwise have cost.
  cta: Continue
  powered_by:
    logo: ui/assets/logos/foundryiq-logo.png
    label: Foundry Agents
    description: >
      Tool calling for network remediation, reroute, admin-down, operator
      approval, field dispatch, and engineer coordination.

- title: Communications Specialist
  body: >
    The final specialist handles all incident communications. It first checks
    Microsoft 365 — Work IQ — for the right people to notify, surfacing ACME's
    and BigBank's escalation contacts and the contractual 15-minute
    notification clock. It then creates a formal SEV-1 incident ticket,
    publishes customer advisories to the affected enterprise VPN customers,
    and emails a structured incident report to NOC leadership — all referencing
    the same root cause, blast radius, and remediation status.
  cta: Continue
  agent_image: ui/assets/agents/communicationsspecialist_fullbody.png
  powered_by:
    logo: ui/assets/logos/copilot-logo.png
    label: Work IQ
    description: >
      Microsoft 365 context (customer contacts, prior incident email, NOC
      Teams governance note) plus structured generation of incident tickets,
      customer advisories, and stakeholder reports.

- title: Investigation Complete
  body: >
    From chaos to resolution in minutes. The agents recognised the pattern
    across twenty alarms, traced the root cause, and exposed the hidden flaw —
    the “redundant” backup runs through the same duct. They quantified the
    exposure at $75,000 an hour, then paused to let the operator approve the
    field dispatch before rolling a truck. Because the reroute landed in about
    ninety seconds, that exposure was held to under $2,000 — and using
    Microsoft 365 context, the right customers were notified inside their
    contractual 15-minute window. Evidence-based, human-approved, and measured
    in dollars.
  cta: Continue

- title: Demo Complete
  body: >
    We hope you're as excited about graph-enabled agents as we are, all
    powered by the Microsoft IQ stack. We can't wait to see what you build.
  cta: Close
  agent_image: ui/assets/agents/group_photo.png
