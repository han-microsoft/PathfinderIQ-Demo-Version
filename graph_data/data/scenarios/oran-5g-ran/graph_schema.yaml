# ============================================================================
# Graph schema — O-RAN 5G RAN scenario (schema-driven seeding)
# ============================================================================
# Consumed by:
#   - graph_data/scripts/seed_cosmos.py --schema-driven  (vertices + edges)
#   - app/backend/app/scenario/_metadata.py              (label summary)
# Edge endpoints are matched by the named CSV column (vertex ids are globally
# unique across labels).

data_dir: data/entities

vertices:
  - label: CoreNetwork
    csv_file: DimCoreNetwork.csv
    id_column: CoreId
    partition_key: core
    properties: [CoreId, Name, Region, NSSF, AMF, Latitude, Longitude]

  - label: gNB
    csv_file: DimGNB.csv
    id_column: gNBId
    partition_key: gnb
    properties: [gNBId, Name, City, Region, Vendor, Model, Latitude, Longitude]

  - label: CU
    csv_file: DimCU.csv
    id_column: CUId
    partition_key: cu
    properties: [CUId, gNBId, CUType, SoftwareVersion]

  - label: DU
    csv_file: DimDU.csv
    id_column: DUId
    partition_key: du
    properties: [DUId, gNBId, CUId, Numerology, MaxLayers]

  - label: Cell
    csv_file: DimCell.csv
    id_column: CellId
    partition_key: cell
    properties: [CellId, DUId, Band, FreqMHz, PCI, AzimuthDeg, MaxPRB]

  - label: Slice
    csv_file: DimSlice.csv
    id_column: SliceId
    partition_key: slice
    properties: [SliceId, SST, SNSSAI, SLALatencyMs, SLAThroughputMbps, TenantName]

  - label: SLAPolicy
    csv_file: DimSLAPolicy.csv
    id_column: SLAPolicyId
    partition_key: policy
    properties: [SLAPolicyId, SliceId, MaxLatencyMs, MinThroughputMbps, PenaltyPerHourUSD, Tier]

  - label: UE
    csv_file: DimUE.csv
    id_column: UEId
    partition_key: ue
    properties: [UEId, CellId, SliceId, DeviceClass, SubscriberCount]

  - label: TransportLink
    csv_file: DimTransportLink.csv
    id_column: LinkId
    partition_key: link
    properties: [LinkId, LinkType, SourceId, TargetId, CapacityGbps, MediaType]

edges:
  - label: hosts
    csv_file: DimCU.csv
    source: { label: gNB, property: gNBId, column: gNBId }
    target: { label: CU, property: CUId, column: CUId }
  - label: hosts
    csv_file: DimDU.csv
    source: { label: gNB, property: gNBId, column: gNBId }
    target: { label: DU, property: DUId, column: DUId }
  - label: controls
    csv_file: DimDU.csv
    source: { label: CU, property: CUId, column: CUId }
    target: { label: DU, property: DUId, column: DUId }
  - label: serves
    csv_file: DimCell.csv
    source: { label: DU, property: DUId, column: DUId }
    target: { label: Cell, property: CellId, column: CellId }
  - label: carries
    csv_file: FactCellSlice.csv
    source: { label: Cell, property: CellId, column: CellId }
    target: { label: Slice, property: SliceId, column: SliceId }
  - label: attached_to
    csv_file: DimUE.csv
    source: { label: UE, property: UEId, column: UEId }
    target: { label: Cell, property: CellId, column: CellId }
  - label: uses
    csv_file: DimUE.csv
    source: { label: UE, property: UEId, column: UEId }
    target: { label: Slice, property: SliceId, column: SliceId }
  - label: governed_by
    csv_file: DimSLAPolicy.csv
    source: { label: Slice, property: SliceId, column: SliceId }
    target: { label: SLAPolicy, property: SLAPolicyId, column: SLAPolicyId }
  - label: link_source
    csv_file: DimTransportLink.csv
    source: { label: TransportLink, property: LinkId, column: LinkId }
    target: { label: Element, property: id, column: SourceId }
  - label: link_target
    csv_file: DimTransportLink.csv
    source: { label: TransportLink, property: LinkId, column: LinkId }
    target: { label: Element, property: id, column: TargetId }
