# Deploy manifest for telecom-playground-v2 scenario
# Target: Your Fabric workspace (update IDs below after provisioning)
#
# Usage:
#   cd graph_data
#   uv run python3 scripts/fabric/deploy_scenario.py --manifest data/scenarios/telecom-playground-v2/deploy_manifest.yaml
#   uv run python3 scripts/fabric/deploy_scenario.py --manifest data/scenarios/telecom-playground-v2/deploy_manifest.yaml --dry-run
#   uv run python3 scripts/fabric/deploy_scenario.py --manifest data/scenarios/telecom-playground-v2/deploy_manifest.yaml --stage lakehouse --force

target:
  tenant_id: "<your-fabric-tenant-id>"
  # Uncomment for service principal auth (cross-tenant programmatic):
  client_id: "<your-app-registration-client-id>"
  client_secret_env: "FABRIC_CLIENT_SECRET"
  workspace_name: "<your-workspace-name>"
  workspace_id: "<your-fabric-workspace-id>"
  capacity_id: "<your-fabric-capacity-id>"
  folder_path: "GraphWorkshopData/telecom-playground-v2"

scenario:
  name: "telecom-playground-v2"
  data_root: "data/scenarios/telecom-playground-v2"

resources:
  lakehouse:
    name: "LH_TelecomV2"
  eventhouse:
    name: "EH_TelecomV2"
  ontology:
    name: "ONT_TelecomV2"
    schema: "graph_schema.yaml"

output:
  env_file: "azure_config.env"
