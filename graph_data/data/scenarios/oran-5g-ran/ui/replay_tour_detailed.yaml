- title: Scenario Overview
  body: >
    A fibre cut on the Sydney-Melbourne corridor has triggered a cascading
    alert storm across enterprise VPNs, broadband, and mobile services. In
    this demo, a multi-agent system built entirely on the Microsoft stack
    investigates root cause, blast radius, and remediation in minutes, work
    that previously took hours of manual coordination.
  cta: Start Demo

- title: NOC Orchestrator
  body: >
    The orchestrator receives the raw alert burst and acts as the central
    coordinator. Built on Azure AI Foundry, it decomposes the incident into
    specialist tasks and delegates them in parallel, combining graph
    reasoning, document retrieval, and field logistics into a single agentic
    workflow.
  cta: Continue
  agent_image: ui/assets/agents/nocorchestrator_fullbody.png
  powered_by:
    logo: ui/assets/logos/foundryiq-logo.png
    label: Azure AI Foundry
    description: >
      Multi-agent orchestration, task decomposition, parallel delegation, and
      synthesis across specialist agents.

- title: Orchestrator - Planning
  body: >
    The orchestrator is now reading the correlated alerts, forming a diagnosis
    plan, and dispatching tasks to three specialist agents simultaneously.
    Each agent has its own tools and data sources, but they all share the same
    graph ontology as their common understanding of the network.

    Watch for the highlights on key tool results, they explain why each
    finding matters.
  cta: Continue

- title: Network Investigator
  body: >
    This agent queries the network ontology in Microsoft Fabric using GQL to
    trace topology dependencies, then cross-references real-time telemetry
    from Fabric Eventhouse (KQL) to confirm optical power loss. It also
    performs per-sensor fault localization, reading individual optical sensors
    along the corridor to triangulate the exact fault segment, and checks
    whether the backup fibre shares the same physical conduit.
  cta: Continue
  agent_image: ui/assets/agents/networkinvestigator_fullbody.png
  powered_by:
    logo: ui/assets/logos/fabric-logo.png
    label: Fabric IQ
    description: >
      Fabric Graph (GQL) for topology traversal and sensor lookup, plus Fabric
      Eventhouse (KQL) for real-time telemetry and per-sensor readings.

- title: Knowledge Analyst
  body: >
    This agent searches operational runbooks and historical incident tickets
    using Azure AI Search with vector and semantic ranking. It finds the exact
    SOP for this fault type, surfaces past incidents on the same corridor
    including a critical shared-risk conduit warning, and quantifies the SLA
    penalty exposure: $75,000 per hour across the affected enterprise VPNs.
  cta: Continue
  agent_image: ui/assets/agents/knowledgeanalyst_fullbody.png
  powered_by:
    logo: ui/assets/logos/foundryiq-logo.png
    label: Foundry IQ
    description: >
      Azure AI Search for vector retrieval across runbooks, SOPs, historical
      tickets, and SLA policies.

- title: Field Coordinator
  body: >
    This agent traverses the graph to find amplifier sites, optical sensors
    with GPS coordinates, servicing depots, and on-duty engineers along the
    corridor. It then checks equipment manifests via search to confirm OTDR
    and splicer availability, producing a ranked dispatch plan ready for
    operator approval.
  cta: Continue
  agent_image: ui/assets/agents/fieldcoordinator_fullbody.png
  powered_by:
    logo: ui/assets/logos/copilot-logo.png
    label: Work IQ
    description: >
      Graph traversal for depot and roster lookup plus AI Search for equipment
      manifests, bridging digital topology to physical field operations.

- title: Orchestrator - Remediation
  body: >
    The orchestrator synthesises all specialist findings and executes
    immediate remediation: rerouting VPN traffic to the backup MPLS path,
    placing the failed link in admin-down to prevent flapping, dispatching the
    nearest field engineer to the Goulburn splice site, and calling them to
    confirm ETA.
  cta: Continue
  powered_by:
    logo: ui/assets/logos/foundryiq-logo.png
    label: Foundry Agents
    description: >
      Tool calling for network remediation, reroute, admin-down, field
      dispatch, and engineer coordination.

- title: Communications Specialist
  body: >
    The final specialist handles all incident communications, creating a
    formal SEV-1 incident ticket, publishing customer advisories to affected
    enterprise VPN customers, and emailing a structured incident report to NOC
    leadership. All three reference the same root cause, blast radius, and
    remediation status.
  cta: Continue
  agent_image: ui/assets/agents/communicationsspecialist_fullbody.png
  powered_by:
    logo: ui/assets/logos/foundryiq-logo.png
    label: Foundry Agents
    description: >
      Structured document generation for incident tickets, customer advisories,
      and stakeholder reports from a single synthesis.

- title: Investigation Complete
  body: >
    From chaos to resolution, the agents recognised the pattern across twenty
    alerts, traced the root cause through the graph, localised the fault to a
    150 km corridor segment, discovered the backup fibre shares the same duct,
    quantified $75k per hour in SLA exposure, dispatched a field engineer with
    GPS and equipment, and communicated to all stakeholders. All evidence-
    based, all in minutes.
  cta: Continue

- title: Demo Complete
  body: >
    We hope you're as excited about graph-enabled agents as we are, all
    powered by the Microsoft IQ stack. We can't wait to see what you build.
  cta: Close
  agent_image: ui/assets/agents/group_photo.png
