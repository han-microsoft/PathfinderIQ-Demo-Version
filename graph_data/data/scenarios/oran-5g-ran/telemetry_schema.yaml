# ============================================================================
# Telemetry schema — O-RAN 5G RAN scenario (schema-driven NoSQL seeding)
# ============================================================================
# Consumed by: graph_data/scripts/seed_cosmos.py --schema-driven
# Maps each telemetry CSV to a Cosmos NoSQL container. The `telemetry` container
# is partitioned on /entityId (set from entity_column) and discriminated by
# `kind`; the `alerts` container is partitioned on /SourceNodeId (a CSV column).

sources:
  - container: telemetry
    csv_file: SliceKPM.csv
    kind: slice
    entity_column: SliceId
    id_template: "kpm-slice-{SliceId}-{Timestamp}"

  - container: telemetry
    csv_file: CellKPM.csv
    kind: cell
    entity_column: CellId
    id_template: "kpm-cell-{CellId}-{Timestamp}"

  - container: telemetry
    csv_file: UEKPM.csv
    kind: ue
    entity_column: UEId
    id_template: "kpm-ue-{UEId}-{Timestamp}"

  - container: alerts
    csv_file: AlarmStream.csv
    id_column: AlarmId
