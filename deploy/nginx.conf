# Unified container — nginx serves frontend and proxies API to uvicorn.
# Installed to /etc/nginx/conf.d/app.conf inside the container.
server {
    listen 8080;
    server_name _;

    # Security headers — baseline XSS, clickjacking, and MIME sniffing protection.
    # MSAL (Entra ID auth) requires connect-src to login.microsoftonline.com for
    # token acquisition/refresh, and frame-src for silent token renewal via iframe.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-UPKQBsypBgwihahjLGCRbmUrIej91TOfAeQPRZlFkn0=' https://www.clarity.ms; style-src 'self' 'unsafe-inline'; connect-src 'self' https://login.microsoftonline.com https://www.clarity.ms; frame-src 'self' https://login.microsoftonline.com https://player.vimeo.com; img-src 'self' data:; font-src 'self';" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Frontend static files (Vite build output)
    root /workspace/static;
    index index.html;

    # SPA fallback — all non-file requests resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy — forward /api/* to uvicorn on port 8000
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE support — disable buffering for streaming responses
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        # Long timeout for agent tool calls — must exceed CHAT_TIMEOUT_SECONDS
        # in chat.py (default 300s). 600s provides 2× safety margin for
        # Fabric cold starts plus full investigation chains.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Health check endpoint — proxied to backend
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
    }
}
