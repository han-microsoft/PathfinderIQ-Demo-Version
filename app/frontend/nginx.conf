server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — baseline XSS, clickjacking, and MIME sniffing protection.
    # MSAL (Entra ID auth) requires connect-src to login.microsoftonline.com for
    # token acquisition/refresh, and frame-src for silent token renewal via iframe.
    # add_header X-Frame-Options "DENY" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://login.microsoftonline.com https://*.login.microsoftonline.com https://*.msftauth.net; frame-src 'self' https://login.microsoftonline.com https://*.login.microsoftonline.com; img-src 'self' data:; font-src 'self'; form-action 'self' https://login.microsoftonline.com;" always;

    # Compression — reduces payload size for text-based assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache hashed static assets (Vite output includes content hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
